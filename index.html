<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ECG モニター</title>
<style>
  :root{
    --bg:#040d08;
    --grid-fine:#0c2417;
    --grid-bold:#16432a;
    --trace:#3dff7a;
    --trace-glow:rgba(61,255,122,.5);
    --amber:#ffb454;
    --red:#ff4d4d;
    --panel:rgba(7,20,13,.96);
    --panel-line:#1c4730;
    --ink:#d6f0e0;
    --ink-dim:#6f9a82;
    --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--mono);
    -webkit-font-smoothing:antialiased;position:fixed;inset:0;
  }

  /* full-screen scope */
  #cv{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* top status, always visible, minimal */
  .status{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:flex-start;justify-content:flex-end;
    padding:calc(env(safe-area-inset-top,0) + 10px) 16px 0;
    pointer-events:none;z-index:5;
  }
  .rname{font-size:13px;letter-spacing:.06em;color:var(--amber);
    text-shadow:0 0 8px rgba(255,180,84,.4);max-width:60%}
  .rname b{display:block;font-size:16px;color:#fff;letter-spacing:.02em}
  .hrbox{text-align:right}
  .hrbox .v{font-size:54px;font-weight:700;line-height:.8;color:var(--trace);
    text-shadow:0 0 16px var(--trace-glow)}
  .hrbox .u{font-size:12px;color:var(--ink-dim);letter-spacing:.12em}
  .heart{color:var(--red);font-size:16px;transition:transform .07s;display:inline-block}
  .heart.beat{transform:scale(1.6)}

  /* tap hint */
  .hint{
    position:absolute;bottom:calc(env(safe-area-inset-bottom,0) + 18px);
    left:0;right:0;text-align:center;font-size:11px;color:var(--ink-dim);
    letter-spacing:.18em;z-index:5;pointer-events:none;
    animation:fade 2.6s ease-in-out infinite;
  }
  @keyframes fade{0%,100%{opacity:.25}50%{opacity:.7}}

  /* bottom sheet menu */
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:8;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;z-index:9;
    background:var(--panel);border-top:1px solid var(--panel-line);
    border-radius:18px 18px 0 0;
    padding:8px 14px calc(env(safe-area-inset-bottom,0) + 16px);
    transform:translateY(102%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    max-height:80vh;overflow-y:auto;
    box-shadow:0 -10px 40px rgba(0,0,0,.5);
  }
  .sheet.open{transform:translateY(0)}
  .grip{width:42px;height:5px;border-radius:3px;background:#2c5840;margin:6px auto 12px}

  .tabs{display:flex;gap:6px;margin-bottom:12px;position:sticky;top:0}
  .tab{flex:1;padding:9px 4px;text-align:center;font-size:12px;
    border:1px solid var(--panel-line);border-radius:8px;background:#0d2417;
    color:var(--ink-dim);cursor:pointer;letter-spacing:.04em}
  .tab.on{background:var(--trace);color:#04130a;border-color:var(--trace);font-weight:700}

  .page{display:none}
  .page.on{display:block}

  .cat-title{font-size:10px;letter-spacing:.16em;color:var(--ink-dim);
    text-transform:uppercase;margin:14px 0 7px}
  .cat-title:first-child{margin-top:0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .chip{
    background:#0e2417;border:1px solid var(--panel-line);color:var(--ink);
    font-family:var(--mono);font-size:12px;padding:10px 9px;border-radius:9px;
    text-align:left;line-height:1.25;cursor:pointer;transition:.12s}
  .chip span{display:block;font-size:9px;color:var(--ink-dim);margin-top:2px;letter-spacing:.04em}
  .chip.on{background:var(--trace);color:#04130a;border-color:var(--trace);font-weight:700}
  .chip.on span{color:rgba(4,19,10,.7)}
  .chip.danger.on{background:var(--red);border-color:var(--red);color:#fff}
  .chip.danger.on span{color:rgba(255,255,255,.85)}

  /* HR stepper */
  .stepper{display:flex;align-items:center;gap:12px;justify-content:center;margin:6px 0 14px}
  .stepper button{width:60px;height:60px;border-radius:50%;font-size:30px;
    background:#0e2417;border:1px solid var(--panel-line);color:var(--trace);cursor:pointer}
  .stepper button:active{background:var(--trace);color:#04130a}
  .stepper .big{font-size:46px;font-weight:700;color:var(--trace);min-width:120px;text-align:center;
    text-shadow:0 0 12px var(--trace-glow)}
  .stepper .big small{font-size:13px;color:var(--ink-dim);display:block;font-weight:400}
  .quick{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .quick button{padding:7px 14px;border-radius:20px;background:#0e2417;
    border:1px solid var(--panel-line);color:var(--ink);font-family:var(--mono);font-size:13px;cursor:pointer}
  .quick button.on{background:var(--amber);color:#1a0e00;border-color:var(--amber);font-weight:700}

  /* condition rows */
  .crow{margin-bottom:16px}
  .crow .lab{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px}
  .crow .lab .rv{color:var(--trace);font-weight:700}
  .seg{display:flex;gap:5px;flex-wrap:wrap}
  .seg button{flex:1;min-width:56px;padding:9px 4px;border-radius:8px;background:#0e2417;
    border:1px solid var(--panel-line);color:var(--ink);font-family:var(--mono);font-size:12px;cursor:pointer}
  .seg button.on{background:var(--trace);color:#04130a;border-color:var(--trace);font-weight:700}

  .toolrow{display:flex;gap:8px;margin-bottom:12px}
  .toolrow button{flex:1;padding:11px;border-radius:9px;background:#0e2417;
    border:1px solid var(--panel-line);color:var(--ink);font-family:var(--mono);font-size:13px;cursor:pointer;letter-spacing:.05em}
  .toolrow button.on{background:var(--amber);color:#1a0e00;border-color:var(--amber);font-weight:700}

  .note{font-size:11px;line-height:1.6;color:var(--ink-dim);
    border-top:1px solid var(--panel-line);padding-top:12px;margin-top:4px}
  .note b{color:var(--amber)}
</style>
</head>
<body>
  <canvas id="cv"></canvas>

  <div class="status">
    <div class="hrbox">
      <div class="v"><span class="heart" id="heart">♥</span><span id="hrV">72</span></div>
      <div class="u">HR / min</div>
    </div>
  </div>

  <div class="hint" id="hint">▲ タップして操作</div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="tabs">
      <div class="tab on" data-p="rhythm">リズム</div>
      <div class="tab" data-p="rate">心拍数</div>
      <div class="tab" data-p="cond">条件</div>
    </div>

    <!-- RHYTHM PAGE -->
    <div class="page on" id="page-rhythm">
      <div id="rhythmCats"></div>
      <div class="note" id="rNote"></div>
    </div>

    <!-- RATE PAGE -->
    <div class="page" id="page-rate">
      <div class="stepper">
        <button id="hrMinus">−</button>
        <div class="big"><span id="hrBig">72</span><small>bpm</small></div>
        <button id="hrPlus">＋</button>
      </div>
      <div class="cat-title">クイック設定</div>
      <div class="quick" id="hrQuick"></div>
      <div class="note">HRを変えると間隔が連動します。リズムによっては固定レート（VF/心静止など）です。</div>
    </div>

    <!-- CONDITION PAGE -->
    <div class="page" id="page-cond">
      <div class="toolrow">
        <button id="runBtn" class="on">❚❚ 一時停止</button>
        <button id="gridBtn" class="on">グリッド</button>
      </div>

      <div class="crow">
        <div class="lab"><span>ST偏位</span><span class="rv" id="stRV">0.0 mm</span></div>
        <div class="seg" data-cond="st">
          <button data-v="-30">低下↓↓</button>
          <button data-v="-15">低下↓</button>
          <button data-v="0" class="on">正常</button>
          <button data-v="20">上昇↑</button>
          <button data-v="40">上昇↑↑</button>
        </div>
      </div>

      <div class="crow">
        <div class="lab"><span>QRS幅</span><span class="rv" id="qrsRV">90 ms</span></div>
        <div class="seg" data-cond="qrs">
          <button data-v="80" class="on">正常</button>
          <button data-v="120">境界</button>
          <button data-v="160">幅広</button>
          <button data-v="200">超幅広</button>
        </div>
      </div>

      <div class="crow">
        <div class="lab"><span>PR間隔</span><span class="rv" id="prRV">160 ms</span></div>
        <div class="seg" data-cond="pr">
          <button data-v="120">短縮</button>
          <button data-v="160" class="on">正常</button>
          <button data-v="240">延長</button>
          <button data-v="320">高度延長</button>
        </div>
      </div>

      <div class="crow">
        <div class="lab"><span>T波</span><span class="rv" id="tRV">標準</span></div>
        <div class="seg" data-cond="tAmp">
          <button data-v="-80">陰性</button>
          <button data-v="100" class="on">標準</button>
          <button data-v="180">増高</button>
          <button data-v="260">テント状</button>
        </div>
      </div>

      <div class="crow">
        <div class="lab"><span>基線ノイズ</span><span class="rv" id="nzRV">5%</span></div>
        <div class="seg" data-cond="noise">
          <button data-v="0">なし</button>
          <button data-v="5" class="on">少</button>
          <button data-v="20">中</button>
          <button data-v="45">多</button>
        </div>
      </div>

      <div class="crow">
        <div class="lab"><span>呼吸性の基線動揺</span><span class="rv" id="wRV">なし</span></div>
        <div class="seg" data-cond="wander">
          <button data-v="0" class="on">なし</button>
          <button data-v="1">弱</button>
          <button data-v="2">強</button>
        </div>
      </div>
    </div>
  </div>

<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();

// ---------- state ----------
const S={hr:72,pAmp:1,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,
  running:true,showGrid:true,wander:0,special:null,delta:0};

// ---------- rhythm catalog (grouped) ----------
const CATS=[
 {g:'正常・洞性', items:[
   {k:'nsr',n:'正常洞調律',en:'Normal Sinus',s:{hr:72,pAmp:1,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:null,delta:0},
     note:'<b>正常洞調律</b>：P→QRS→Tが規則的。PR 120–200ms、QRS &lt;120ms。'},
   {k:'sb',n:'洞性徐脈',en:'Sinus Brady',s:{hr:42,pAmp:1,pr:170,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:null,delta:0},
     note:'<b>洞性徐脈</b>：HR &lt;60。波形は正常だが間隔延長。'},
   {k:'st',n:'洞性頻脈',en:'Sinus Tachy',s:{hr:140,pAmp:1,pr:130,qrs:85,rAmp:1,st:0,tAmp:1,noise:.06,special:null,delta:0},
     note:'<b>洞性頻脈</b>：HR &gt;100。P波は保たれる。'},
   {k:'junc',n:'接合部調律',en:'Junctional',s:{hr:45,pAmp:-0.6,pr:90,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:'junc',delta:0},
     note:'<b>接合部調律</b>：陰性P波／P消失。HR 40–60前後の補充調律。'},
 ]},
 {g:'上室性', items:[
   {k:'afib',n:'心房細動',en:'Atrial Fib',s:{hr:120,pAmp:0,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:'afib',delta:0},
     note:'<b>心房細動</b>：P消失・基線細動、RR<b>絶対不整</b>。'},
   {k:'afl',n:'心房粗動',en:'Atrial Flutter',s:{hr:150,pAmp:0,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.04,special:'aflut',delta:0},
     note:'<b>心房粗動</b>：鋸歯状F波。2:1〜4:1伝導。'},
   {k:'psvt',n:'PSVT',en:'Paroxysmal SVT',s:{hr:185,pAmp:0,pr:120,qrs:85,rAmp:1,st:0,tAmp:1,noise:.04,special:null,delta:0},
     note:'<b>PSVT</b>：規則的な発作性頻拍 150–220。P不明瞭。'},
   {k:'pac',n:'上室期外収縮',en:'PAC',s:{hr:72,pAmp:1,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:'pac',delta:0},
     note:'<b>PAC</b>：早期の異所性P波つき正常QRS。非代償性休止。'},
   {k:'wpw',n:'WPW症候群',en:'WPW (δ wave)',s:{hr:80,pAmp:1,pr:90,qrs:130,rAmp:1,st:0,tAmp:1,noise:.05,special:null,delta:1},
     note:'<b>WPW</b>：PR短縮＋デルタ波でQRS立ち上がりが鈍化。'},
 ]},
 {g:'心室性', items:[
   {k:'pvc',n:'心室期外収縮',en:'PVC',s:{hr:75,pAmp:1,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:'pvc',delta:0},
     note:'<b>PVC（多発性）</b>：同じ形の幅広QRSが早期出現＋代償性休止。'},
   {k:'mpvc',n:'多源性PVC',en:'Multifocal PVC',d:1,s:{hr:75,pAmp:1,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:'mpvc',delta:0},
     note:'<b>多源性PVC</b>：複数の起源から異なる形のPVCが出現。VFへ移行する危険が高い。'},
   {k:'vt',n:'心室頻拍',en:'V-Tach',d:1,s:{hr:180,pAmp:0,pr:160,qrs:160,rAmp:1.4,st:0,tAmp:-.6,noise:.05,special:'vt',delta:0},
     note:'<b>VT</b>：幅広QRSの規則的頻拍（単形性）。無脈ならショック適応。'},
   {k:'tdp',n:'Torsades',en:'Torsades de P.',d:1,s:{hr:220,pAmp:0,pr:160,qrs:160,rAmp:1,st:0,tAmp:-.6,noise:.05,special:'tdp',delta:0},
     note:'<b>トルサード</b>：QRSが捻れて極性が反転（紡錘状に変動）。MgSO₄。'},
   {k:'vf',n:'心室細動',en:'V-Fib',d:1,s:{hr:200,pAmp:0,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.1,special:'vf',delta:0},
     note:'<b>VF</b>：無秩序な細動波。<b>ショック適応・即CPR</b>。'},
   {k:'ivr',n:'心室補充調律',en:'Idioventricular',s:{hr:35,pAmp:0,pr:160,qrs:170,rAmp:1.2,st:0,tAmp:-.5,noise:.05,special:'vt',delta:0},
     note:'<b>心室固有調律</b>：幅広QRSの徐脈（20–40）。P波なし。'},
 ]},
 {g:'ブロック・伝導', items:[
   {k:'avb1',n:'I度ブロック',en:'1° AV Block',s:{hr:65,pAmp:1,pr:320,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:null,delta:0},
     note:'<b>I度AVブロック</b>：PR一定延長(&gt;200ms)、脱落なし。'},
   {k:'avb2',n:'Wenckebach',en:'2° Mobitz I',s:{hr:60,pAmp:1,pr:160,qrs:90,rAmp:1,st:0,tAmp:1,noise:.05,special:'wenck',delta:0},
     note:'<b>II度MobitzI</b>：PR漸増→QRS脱落の周期。'},
   {k:'avb2b',n:'Mobitz II',en:'2° Mobitz II',s:{hr:55,pAmp:1,pr:170,qrs:120,rAmp:1,st:0,tAmp:1,noise:.05,special:'mob2',delta:0},
     note:'<b>II度MobitzII</b>：PR一定のまま突然QRS脱落。'},
   {k:'avb3',n:'III度ブロック',en:'Complete',s:{hr:38,pAmp:1,pr:160,qrs:150,rAmp:1,st:0,tAmp:1,noise:.05,special:'cavb',delta:0},
     note:'<b>完全房室ブロック</b>：PとQRSが無関係（房室解離）。'},
   {k:'rbbb',n:'右脚ブロック',en:'RBBB',s:{hr:75,pAmp:1,pr:160,qrs:140,rAmp:1,st:0,tAmp:-.4,noise:.05,special:'rbbb',delta:0},
     note:'<b>RBBB</b>：QRS幅広・rSR\'様（M型）。'},
   {k:'lbbb',n:'左脚ブロック',en:'LBBB',s:{hr:75,pAmp:1,pr:160,qrs:150,rAmp:1.1,st:0,tAmp:-.5,noise:.05,special:null,delta:0},
     note:'<b>LBBB</b>：QRS幅広・幅広い単一R波。'},
 ]},
 {g:'電解質・心停止', items:[
   {k:'hyperk',n:'高カリウム',en:'Hyperkalemia',s:{hr:70,pAmp:.3,pr:200,qrs:150,rAmp:1,st:0,tAmp:2.6,noise:.05,special:null,delta:0},
     note:'<b>高K血症</b>：テント状T・QRS幅広・P平坦化。'},
   {k:'hypok',n:'低カリウム',en:'Hypokalemia',s:{hr:75,pAmp:1,pr:160,qrs:90,rAmp:1,st:-15,tAmp:.3,noise:.05,special:'uwave',delta:0},
     note:'<b>低K血症</b>：T平低・ST低下・U波出現。'},
   {k:'hac',n:'発症直後MI',en:'Hyperacute T',s:{hr:80,pAmp:1,pr:160,qrs:95,rAmp:1.1,st:8,tAmp:2.6,noise:.05,special:null,delta:0},
     note:'<b>発症直後MI</b>：T波増高（hyperacute T）。ST上昇は軽度〜未出現で超急性期。'},
   {k:'stemi',n:'ST上昇(STEMI)',en:'ST Elevation',s:{hr:80,pAmp:1,pr:160,qrs:95,rAmp:1.1,st:45,tAmp:0.4,noise:.05,special:null,delta:0},
     note:'<b>STEMI</b>：J点から段差で立ち上がる平坦な ST 台地。狭心症・心筋梗塞・心膜炎などで出現。'},
   {k:'pace',n:'ペースメーカー',en:'Paced (V)',s:{hr:70,pAmp:0,pr:160,qrs:170,rAmp:1.3,st:0,tAmp:-.6,noise:.04,special:'paced',delta:0},
     note:'<b>心室ペーシング</b>：スパイク直後に幅広QRS。'},
   {k:'pea',n:'PEA',en:'Pulseless Elec.',d:1,s:{hr:40,pAmp:1,pr:160,qrs:110,rAmp:.7,st:0,tAmp:.6,noise:.05,special:null,delta:0},
     note:'<b>PEA</b>：波形はあるが脈なし＝臨床所見。<b>非ショック適応</b>。'},
   {k:'asys',n:'心静止',en:'Asystole',d:1,s:{hr:0,pAmp:0,pr:160,qrs:0,rAmp:0,st:0,tAmp:0,noise:.02,special:'asys',delta:0},
     note:'<b>心静止</b>：電気活動なし(平坦)。<b>非ショック適応</b>。'},
 ]},
];

// ---------- waveform math ----------
function gauss(x,mu,s,a){const d=(x-mu)/s;return a*Math.exp(-0.5*d*d);}
function beatWave(t,p){
  const prF=p.pr/160, qrsF=Math.max(.4,p.qrs/90);
  let v=0;
  const pPos=0.30-0.10*prF;
  v+=gauss(t,Math.max(.05,pPos),0.022,0.15*p.pAmp);
  // delta wave (WPW): slurred upstroke before R
  if(p.delta){v+=gauss(t,0.475,0.020,0.18*p.rAmp);}
  if(p.vt){
    // VT/IVR/Torsades/PVC: wide bizarre monomorphic complex with discordant terminal portion
    v+=gauss(t,0.485,0.038,1.20*p.rAmp);
    v+=gauss(t,0.625,0.050,1.30*p.tAmp);
  }else{
    v+=gauss(t,0.46,0.010*qrsF,-0.10*p.rAmp);
    v+=gauss(t,0.50,0.012*qrsF,1.0*p.rAmp);
    v+=gauss(t,0.555,0.013*qrsF,-0.30*p.rAmp);
    // RBBB second R' bump
    if(p.rsr){v+=gauss(t,0.575,0.016,0.55*p.rAmp);}
    // ST segment: sharp J-point onset, flat horizontal plateau (textbook style)
    if(p.st>0){
      if(t>0.575&&t<0.86){
        const u=(t-0.575)/0.285;
        const onset=u<0.06?(0.5-0.5*Math.cos(Math.PI*u/0.06)):
                    u>0.92?(0.5+0.5*Math.cos(Math.PI*(u-0.92)/0.08)):1;
        v+=p.st*onset;
      }
    }else if(p.st<0){
      if(t>0.56&&t<0.72){
        const u=(t-0.56)/0.16;
        const env=u<0.15?(0.5-0.5*Math.cos(Math.PI*u/0.15)):
                  u>0.85?(0.5+0.5*Math.cos(Math.PI*(u-0.85)/0.15)):1;
        v+=p.st*env;
      }
    }
    v+=gauss(t,0.74,0.05,0.30*p.tAmp);
  }
  // U wave (hypokalemia)
  if(p.uwave)v+=gauss(t,0.88,0.03,0.08);
  return v;
}

const FS=240, SPAN=5;
let buf=new Float32Array(FS*SPAN), wIdx=0;
let beatClock=0, rrCurrent=60/72, lastTs=0;
let wenckN=0, pvcCtr=2, pacCtr=3, mob2Ctr=0, cavbP=0, vfSeed=Math.random()*1e3;
let curType='normal', beatParams={};

function currentRR(){return S.hr<=0?999:60/S.hr;}

function startBeat(){
  curType='normal';
  if(S.special==='pvc'||S.special==='mpvc'){if(--pvcCtr<=0){curType='pvc';pvcCtr=2+(Math.random()*3|0);}}
  else if(S.special==='pac'){if(--pacCtr<=0){curType='pac';pacCtr=3+(Math.random()*3|0);}}
  else if(S.special==='wenck'){if(++wenckN>=4){curType='dropped';wenckN=0;}}
  else if(S.special==='mob2'){if(++mob2Ctr>=3){curType='dropped';mob2Ctr=0;}}
  else if(S.special==='vt'||S.special==='tdp'){curType='vt';}
  else if(S.special==='rbbb'){curType='rbbb';}
  else if(S.special==='paced'){curType='paced';}
  else if(S.special==='junc'){curType='junc';}
}
function paramsForBeat(){
  const p={pAmp:S.pAmp,pr:S.pr,qrs:S.qrs,rAmp:S.rAmp,st:S.st/100,tAmp:S.tAmp,delta:S.delta,
           rsr:0,uwave:(S.special==='uwave'),spike:0};
  if(curType==='pvc'){
    p.pAmp=0;p.st=0;p.delta=0;p.vt=1;
    if(S.special==='mpvc'){
      const r=Math.floor(Math.random()*3);
      if(r===0){p.qrs=180;p.rAmp=1.5;p.tAmp=-0.8;}
      else if(r===1){p.qrs=200;p.rAmp=-1.3;p.tAmp=0.7;}
      else{p.qrs=160;p.rAmp=1.1;p.tAmp=-1.1;}
    }else{p.qrs=185;p.rAmp=1.6;p.tAmp=-0.8;}
  }
  else if(curType==='pac'){p.pAmp=1.4;p.pr=110;}
  else if(curType==='vt'){p.pAmp=0;p.qrs=S.qrs;p.rAmp=S.rAmp;p.vt=1;}
  else if(curType==='dropped'){p.rAmp=0;p.tAmp=0;p.st=0;p.delta=0;if(S.special==='wenck')p.pr=160+wenckN*45;}
  else if(curType==='rbbb'){p.rsr=1;p.qrs=140;}
  else if(curType==='paced'){p.pAmp=0;p.spike=1;p.qrs=175;p.rAmp=1.3;p.tAmp=-.6;}
  else if(curType==='junc'){p.pAmp=-0.6;p.pr=90;}
  return p;
}

function sampleValue(dt){
  if(S.special==='vf'){
    vfSeed+=dt*6;let s=0;
    s+=0.45*Math.sin(vfSeed*2*Math.PI*1.0);
    s+=0.30*Math.sin(vfSeed*2*Math.PI*2.3+1.1);
    s+=0.22*Math.sin(vfSeed*2*Math.PI*3.7+2.0);
    return s*(0.8+0.4*Math.sin(vfSeed*0.7));
  }
  if(S.special==='asys')return 0;
  let base=0;
  if(S.special==='afib')base+=0.05*(Math.sin(beatClock*2*Math.PI*7.3)+0.6*Math.sin(beatClock*2*Math.PI*11.1+1));
  if(S.special==='aflut'){const f=(beatClock*5)%1;base+=0.12*(f<0.7?f/0.7:(1-(f-0.7)/0.3))-0.06;}
  if(S.special==='cavb'){cavbP+=dt/0.75;const pp=cavbP%1;base+=gauss(pp,0.5,0.04,0.13*S.pAmp);}

  const rr=currentRR();
  beatClock+=dt;
  if(beatClock>=rrCurrent){
    beatClock-=rrCurrent;
    rrCurrent=(S.special==='afib')?rr*(0.5+Math.random()):rr;
    startBeat();
    // PAC / PVC come early
    if(curType==='pac'||curType==='pvc')rrCurrent=rr*0.6;
    beatParams=paramsForBeat();
    triggerHeart();
  }
  const t=beatClock/rrCurrent;
  // pacing spike at QRS onset
  if(beatParams.spike && t>0.44 && t<0.455)base+=1.4;
  // torsades amplitude modulation
  let amp=1;
  if(S.special==='tdp')amp=1.05*Math.sin(performance.now()*0.0028);
  base+=beatWave(t,beatParams)*(S.special==='tdp'?amp:1);
  return base;
}

function push(v){buf[wIdx]=v;wIdx=(wIdx+1)%buf.length;}

// ---------- heart + HR ----------
const heart=document.getElementById('heart'),hrV=document.getElementById('hrV');
let ht=null;
function triggerHeart(){
  if(S.special==='vf'||S.special==='asys'||curType==='dropped')return;
  heart.classList.add('beat');clearTimeout(ht);
  ht=setTimeout(()=>heart.classList.remove('beat'),70);
}

// ---------- grid ----------
function drawGrid(){
  if(!S.showGrid)return;
  const sm=Math.max(7,H/26);
  ctx.lineWidth=1;ctx.strokeStyle=css('--grid-fine');ctx.beginPath();
  for(let x=0;x<W;x+=sm){ctx.moveTo(x+.5,0);ctx.lineTo(x+.5,H);}
  for(let y=0;y<H;y+=sm){ctx.moveTo(0,y+.5);ctx.lineTo(W,y+.5);}
  ctx.stroke();
  ctx.strokeStyle=css('--grid-bold');ctx.beginPath();
  for(let x=0;x<W;x+=sm*5){ctx.moveTo(x+.5,0);ctx.lineTo(x+.5,H);}
  for(let y=0;y<H;y+=sm*5){ctx.moveTo(0,y+.5);ctx.lineTo(W,y+.5);}
  ctx.stroke();
}

// ---------- loop ----------
function render(ts){
  if(!lastTs)lastTs=ts;let dt=(ts-lastTs)/1000;lastTs=ts;if(dt>0.1)dt=0.1;
  if(S.running){
    const steps=Math.max(1,Math.round(dt*FS)),sub=dt/steps;
    for(let i=0;i<steps;i++){
      let v=sampleValue(sub);
      v+=(Math.random()-0.5)*S.noise;
      if(S.wander)v+=S.wander*0.12*Math.sin(performance.now()/1000*2*Math.PI*0.3);
      push(v);
    }
  }
  ctx.fillStyle=css('--bg');ctx.fillRect(0,0,W,H);
  drawGrid();
  const mid=H*0.5,gain=H*0.15;
  ctx.lineWidth=2.2;ctx.strokeStyle=css('--trace');
  ctx.shadowColor=css('--trace-glow');ctx.shadowBlur=9;ctx.lineJoin='round';
  ctx.beginPath();
  const n=buf.length;
  for(let i=0;i<n;i++){
    const idx=(wIdx+i)%n,x=(i/(n-1))*W,y=mid-buf[idx]*gain;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  }
  ctx.stroke();ctx.shadowBlur=0;
  hrV.textContent=S.hr>0?Math.round(S.hr):'--';
  requestAnimationFrame(render);
}

// ---------- build rhythm UI ----------
const catWrap=document.getElementById('rhythmCats');
const allChips=[];
CATS.forEach(cat=>{
  const t=document.createElement('div');t.className='cat-title';t.textContent=cat.g;catWrap.appendChild(t);
  const g=document.createElement('div');g.className='grid';
  cat.items.forEach(it=>{
    const b=document.createElement('button');
    b.className='chip'+(it.d?' danger':'')+(it.k==='nsr'?' on':'');
    b.innerHTML=it.n+'<span>'+it.en+'</span>';
    b.addEventListener('click',()=>applyRhythm(it,b));
    allChips.push(b);g.appendChild(b);
  });
  catWrap.appendChild(g);
});
document.getElementById('rNote').innerHTML=CATS[0].items[0].note;

function applyRhythm(it,btn){
  allChips.forEach(c=>c.classList.remove('on'));btn.classList.add('on');
  Object.assign(S,it.s);
  document.getElementById('rNote').innerHTML=it.note;
  // reset bookkeeping
  wenckN=0;pvcCtr=2;pacCtr=3;mob2Ctr=0;cavbP=0;beatClock=0;rrCurrent=currentRR();
  beatParams=paramsForBeat();
  syncCondUI();
  document.getElementById('hrBig').textContent=S.hr;
}

// ---------- HR stepper ----------
const hrBig=document.getElementById('hrBig');
function setHR(v){S.hr=Math.max(0,Math.min(260,v));hrBig.textContent=S.hr;hrV.textContent=S.hr||'--';
  rrCurrent=currentRR();syncQuick();}
document.getElementById('hrMinus').addEventListener('click',()=>setHR(S.hr-5));
document.getElementById('hrPlus').addEventListener('click',()=>setHR(S.hr+5));
const hrQuick=document.getElementById('hrQuick');
[30,40,60,80,100,120,150,180].forEach(v=>{
  const b=document.createElement('button');b.textContent=v;b.dataset.v=v;
  b.addEventListener('click',()=>setHR(v));hrQuick.appendChild(b);
});
function syncQuick(){[...hrQuick.children].forEach(b=>b.classList.toggle('on',+b.dataset.v===S.hr));}

// ---------- condition segments ----------
function fmtCond(cond,v){
  if(cond==='st')return (v/10).toFixed(1)+' mm';
  if(cond==='qrs')return v+' ms';
  if(cond==='pr')return v+' ms';
  if(cond==='tAmp')return v<0?'陰性':(v>200?'テント状':(v>100?'増高':'標準'));
  if(cond==='noise')return v+'%';
  if(cond==='wander')return ['なし','弱','強'][v];
  return v;
}
const rvIds={st:'stRV',qrs:'qrsRV',pr:'prRV',tAmp:'tRV',noise:'nzRV',wander:'wRV'};
document.querySelectorAll('.seg').forEach(seg=>{
  const cond=seg.dataset.cond;
  seg.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      const v=+b.dataset.v;
      if(cond==='st')S.st=v;
      else if(cond==='qrs')S.qrs=v;
      else if(cond==='pr')S.pr=v;
      else if(cond==='tAmp')S.tAmp=v/100;
      else if(cond==='noise')S.noise=v/100;
      else if(cond==='wander')S.wander=v;
      document.getElementById(rvIds[cond]).textContent=fmtCond(cond,v);
      beatParams=paramsForBeat();
    });
  });
});
function syncCondUI(){
  const map={st:S.st,qrs:S.qrs,pr:S.pr,tAmp:Math.round(S.tAmp*100),noise:Math.round(S.noise*100),wander:S.wander};
  document.querySelectorAll('.seg').forEach(seg=>{
    const cond=seg.dataset.cond,cur=map[cond];let matched=false;
    seg.querySelectorAll('button').forEach(b=>{
      const on=(+b.dataset.v===cur);b.classList.toggle('on',on);if(on)matched=true;
    });
    document.getElementById(rvIds[cond]).textContent=fmtCond(cond,cur);
  });
}

// ---------- tools ----------
const runBtn=document.getElementById('runBtn'),gridBtn=document.getElementById('gridBtn');
runBtn.addEventListener('click',()=>{S.running=!S.running;
  runBtn.textContent=S.running?'❚❚ 一時停止':'▶ 再生';runBtn.classList.toggle('on',S.running);});
gridBtn.addEventListener('click',()=>{S.showGrid=!S.showGrid;gridBtn.classList.toggle('on',S.showGrid);});

// ---------- sheet open/close + tabs ----------
const sheet=document.getElementById('sheet'),scrim=document.getElementById('scrim'),hint=document.getElementById('hint');
function openSheet(){sheet.classList.add('open');scrim.classList.add('open');hint.style.display='none';}
function closeSheet(){sheet.classList.remove('open');scrim.classList.remove('open');}
cv.addEventListener('click',openSheet);
scrim.addEventListener('click',closeSheet);
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
    document.getElementById('page-'+t.dataset.p).classList.add('on');
  });
});
// swipe-down to close
let ty0=null;
sheet.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
sheet.addEventListener('touchmove',e=>{
  if(ty0!==null && sheet.scrollTop<=0){const dy=e.touches[0].clientY-ty0;if(dy>70){closeSheet();ty0=null;}}
},{passive:true});

// init
resize();beatParams=paramsForBeat();syncQuick();requestAnimationFrame(render);
})();
</script>
</body>
